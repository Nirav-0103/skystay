apiVersion: apps/v1
kind: Deployment
metadata:
  name: skystay-backend
  namespace: skystay-prod
  labels:
    app: skystay-backend
    version: "1.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: skystay-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # Zero-downtime deploy
  template:
    metadata:
      labels:
        app: skystay-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/api/health"
    spec:
      serviceAccountName: skystay-backend
      containers:
        - name: backend
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/skystay-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http

          # ── Environment (secrets from K8s Secrets) ─────────
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: skystay-secrets
                  key: mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: skystay-secrets
                  key: jwt-secret
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: skystay-secrets
                  key: gemini-api-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: skystay-secrets
                  key: redis-url

          # ── Health checks ───────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 40
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

          # ── Resource limits ─────────────────────────────────
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: skystay-backend

---
apiVersion: v1
kind: Service
metadata:
  name: skystay-backend-svc
  namespace: skystay-prod
spec:
  selector:
    app: skystay-backend
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: skystay-backend
  namespace: skystay-prod
