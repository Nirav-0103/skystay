version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: skystay-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: skystay
      MONGO_INITDB_ROOT_PASSWORD: skystay_secret
      MONGO_INITDB_DATABASE: skystay
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: skystay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 🔥 BACKEND FIXED
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skystay-backend
    restart: unless-stopped
    ports:
      - "5000:5000"

    # ✅ IMPORTANT ADD
    env_file:
      - ./backend/.env

    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://skystay:skystay_secret@mongodb:27017/skystay?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY}

    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skystay-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: skystay-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.2
    container_name: skystay-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: skystay_grafana
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  mongo_data:
  redis_data:
  grafana_data: