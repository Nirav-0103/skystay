groups:
  # ── API Health Alerts ─────────────────────────────────────────
  - name: skystay_api
    rules:
      - alert: BackendDown
        expr: up{job="skystay-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 SkyStay Backend is DOWN"
          description: "Backend has been unreachable for > 1 minute. Immediate action needed."

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) /
          rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ High API Error Rate"
          description: "Error rate is above 5% for 5 minutes."

      - alert: SlowAPIResponse
        expr: http_request_duration_seconds{quantile="0.95"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Slow API Response (p95 > 2s)"
          description: "95th percentile API response time > 2 seconds."

  # ── Infrastructure Alerts ─────────────────────────────────────
  - name: skystay_infra
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (
            rate(node_cpu_seconds_total{mode="idle"}[5m])
          ) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ High CPU on {{ $labels.instance }}"
          description: "CPU usage above 85% for 10+ minutes."

      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) /
          node_memory_MemTotal_bytes * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "🔴 High Memory Usage on {{ $labels.instance }}"
          description: "Memory usage above 90%."

  # ── MongoDB Alerts ────────────────────────────────────────────
  - name: skystay_mongodb
    rules:
      - alert: MongoDBDown
        expr: mongodb_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 MongoDB is DOWN"
          description: "MongoDB connection lost — bookings will fail."

      - alert: MongoDBHighConnections
        expr: mongodb_connections{state="current"} > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ MongoDB High Connections ({{ $value }})"

  # ── Pod Health Alerts ─────────────────────────────────────────
  - name: skystay_pods
    rules:
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Pod CrashLooping: {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is restarting repeatedly."

      - alert: HPAMaxReplicasReached
        expr: |
          kube_horizontalpodautoscaler_status_current_replicas ==
          kube_horizontalpodautoscaler_spec_max_replicas
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ HPA at max replicas — consider scaling cluster"
